name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: praxis
            asset_name: praxis-linux-amd64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: praxis
            asset_name: praxis-linux-arm64

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: praxis
            asset_name: praxis-macos-amd64

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: praxis
            asset_name: praxis-macos-arm64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: praxis.exe
            asset_name: praxis-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Install protobuf compiler (required by LanceDB)
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc

      # Linux cross-compilation dependencies for aarch64
      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64

          # Ubuntu 24.04 uses DEB822 format in ubuntu.sources — pin existing sources to amd64
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's/^Types: deb/Architectures: amd64\nTypes: deb/' /etc/apt/sources.list.d/ubuntu.sources
          fi
          # Also handle the traditional format if present
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          fi

          # Add arm64 sources via ports.ubuntu.com
          CODENAME=$(lsb_release -cs)
          cat <<EOF | sudo tee /etc/apt/sources.list.d/arm64.list
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME} main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME}-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME}-security main restricted universe multiverse
          EOF

          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libssl-dev:arm64 pkg-config

      - name: Build release binary
        run: cargo build --release --features vector --target ${{ matrix.target }} -p praxis
        env:
          # aarch64 cross-compilation settings
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
          PKG_CONFIG_SYSROOT_DIR: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '/usr/aarch64-linux-gnu' || '' }}
          PKG_CONFIG_PATH: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
          PKG_CONFIG_ALLOW_CROSS: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '1' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Linux amd64
          cp artifacts/praxis-linux-amd64/praxis release-assets/praxis-linux-amd64
          chmod +x release-assets/praxis-linux-amd64

          # Linux arm64
          cp artifacts/praxis-linux-arm64/praxis release-assets/praxis-linux-arm64
          chmod +x release-assets/praxis-linux-arm64

          # macOS amd64
          cp artifacts/praxis-macos-amd64/praxis release-assets/praxis-macos-amd64
          chmod +x release-assets/praxis-macos-amd64

          # macOS arm64
          cp artifacts/praxis-macos-arm64/praxis release-assets/praxis-macos-arm64
          chmod +x release-assets/praxis-macos-arm64

          # Windows
          cp artifacts/praxis-windows-amd64.exe/praxis.exe release-assets/praxis-windows-amd64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
